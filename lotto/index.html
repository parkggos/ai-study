<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 추첨기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #76b900;
      --primary-dark: #5a8d00;
      --on-primary: #000000;
      --ink: #000000;
      --canvas: #ffffff;
      --surface-dark: #000000;
      --surface-soft: #f7f7f7;
      --surface-elevated: #1a1a1a;
      --hairline: #cccccc;
      --hairline-strong: #5e5e5e;
      --body: #1a1a1a;
      --mute: #757575;
      --stone: #898989;
      --ash: #a7a7a7;
      --on-dark: #ffffff;
      --on-dark-mute: rgba(255, 255, 255, 0.7);
      --link-blue: #0046a4;
      --radius-sm: 2px;
      --font: "Inter", Arial, Helvetica, sans-serif;
      --ball-1: #fbc02d;
      --ball-2: #42a5f5;
      --ball-3: #ef5350;
      --ball-4: #78909c;
      --ball-5: #66bb6a;
      --page-max: 1160px;
      --page-gutter: 24px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: var(--font);
      font-size: 16px;
      font-weight: 400;
      line-height: 1.5;
      background: var(--canvas);
      color: var(--body);
      display: flex;
      flex-direction: column;
    }

    .hero {
      background: var(--surface-dark);
      color: var(--on-dark);
      padding: 48px 0;
      position: relative;
    }

    .hero-inner {
      max-width: var(--page-max);
      margin: 0 auto;
      padding: 0 var(--page-gutter);
    }

    .hero .corner-square {
      position: absolute;
      top: 24px;
      left: 24px;
      width: 12px;
      height: 12px;
      background: var(--primary);
    }

    .hero-eyebrow {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.43;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .hero h1 {
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: 0;
      margin-bottom: 16px;
    }

    .hero p {
      font-size: 22px;
      font-weight: 400;
      line-height: 1.75;
      color: var(--on-dark-mute);
      max-width: 36em;
    }

    .sub-nav {
      background: var(--surface-soft);
      border-bottom: 1px solid var(--hairline);
    }

    .sub-nav-inner {
      max-width: var(--page-max);
      margin: 0 auto;
      padding: 0 var(--page-gutter);
      display: flex;
      gap: 8px;
      min-height: 56px;
      align-items: center;
    }

    .tab-btn {
      font-family: inherit;
      font-size: 14.4px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.144px;
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      min-height: 40px;
    }

    .tab-btn.active {
      background: var(--ink);
      color: var(--on-dark);
    }

    main {
      flex: 1;
      width: 100%;
      max-width: var(--page-max);
      margin: 0 auto;
      padding: 32px var(--page-gutter) 64px;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .card {
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-sm);
      padding: 24px;
      position: relative;
      margin-bottom: 24px;
    }

    .card .corner-square {
      position: absolute;
      top: 0;
      left: 0;
      width: 12px;
      height: 12px;
      background: var(--primary);
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.43;
      text-transform: uppercase;
      color: var(--mute);
      margin-bottom: 16px;
    }

    .draw-stage {
      margin-bottom: 24px;
    }

    .draw-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr);
      gap: 32px;
      align-items: start;
    }

    .draw-column {
      min-width: 0;
    }

    .saju-column {
      min-width: 0;
    }

    .saju-section {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .saju-section .chat-shell {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .saju-section .chat-messages {
      flex: 1;
      min-height: 240px;
      max-height: none;
    }

    @media (max-width: 768px) {
      .draw-layout {
        grid-template-columns: 1fr;
      }

      .saju-section {
        margin-top: 8px;
        padding-top: 24px;
        border-top: 1px solid var(--hairline);
      }
    }

    .draw-status {
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.67;
      color: var(--ink);
      min-height: 1.67em;
      margin-bottom: 20px;
      transition: color 0.2s;
    }

    .draw-status.drawing {
      color: var(--primary);
    }

    .lotto-machine {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      margin-bottom: 20px;
      padding: 16px 0 8px;
    }

    .machine-stand {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 340px;
    }

    .stand-neck {
      width: 88px;
      height: 28px;
      background: linear-gradient(90deg, #b8b8b8, #ececec 30%, #f5f5f5 50%, #ececec 70%, #a8a8a8);
      border: 1px solid #999;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .globe-housing {
      position: relative;
      width: 300px;
      height: 300px;
      max-width: 100%;
      flex-shrink: 0;
    }

    .globe-housing.agitating {
      animation: drumShake 0.1s ease infinite;
    }

    @keyframes drumShake {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(-2px, 2px) rotate(-0.6deg); }
      50% { transform: translate(1px, -2px) rotate(0.4deg); }
      75% { transform: translate(2px, 1px) rotate(0.6deg); }
    }

    #drumViewport {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: radial-gradient(circle at 50% 55%, #fafafa 0%, #e8eef2 55%, #d0dce4 100%);
    }

    #drumViewport canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    .globe-frame {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 5px solid rgba(180, 190, 200, 0.85);
      box-shadow:
        inset 0 0 30px rgba(255, 255, 255, 0.5),
        inset -8px -8px 20px rgba(0, 0, 0, 0.06),
        0 8px 24px rgba(0, 0, 0, 0.12),
        0 0 0 1px rgba(255, 255, 255, 0.6);
      pointer-events: none;
    }

    .globe-frame::before {
      content: "";
      position: absolute;
      top: 8%;
      left: 12%;
      width: 42%;
      height: 24%;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.65), transparent);
      pointer-events: none;
    }

    .globe-frame::after {
      content: "";
      position: absolute;
      bottom: 18%;
      right: 14%;
      width: 18%;
      height: 10%;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      pointer-events: none;
    }

    .globe-cap {
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 52px;
      height: 14px;
      background: linear-gradient(180deg, #ddd, #aaa);
      border: 1px solid #888;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      z-index: 2;
    }

    .exit-arm {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: -4px;
      position: relative;
      z-index: 1;
    }

    .exit-neck {
      width: 44px;
      height: 36px;
      background: linear-gradient(90deg, #aaa, #ddd 40%, #ccc 60%, #999);
      border: 1px solid #888;
      border-top: none;
      clip-path: polygon(8% 0, 92% 0, 100% 100%, 0 100%);
    }

    .display-tube {
      width: 76px;
      min-height: 84px;
      padding: 10px;
      background: linear-gradient(180deg, #f0f0f0, #e4e4e4);
      border: 2px solid #bbb;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        inset 0 4px 12px rgba(0, 0, 0, 0.08),
        0 4px 12px rgba(0, 0, 0, 0.08);
    }

    .stand-base {
      width: 160px;
      height: 18px;
      margin-top: 8px;
      background: linear-gradient(180deg, #ccc, #888);
      border: 1px solid #777;
      border-radius: var(--radius-sm);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
    }

    .stand-plate {
      width: 200px;
      height: 8px;
      margin-top: 4px;
      background: linear-gradient(180deg, #e8e8e8, #c8c8c8);
      border: 1px solid #aaa;
      border-radius: var(--radius-sm);
    }

    .machine-meta {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--mute);
    }

    .machine-meta span.active {
      color: var(--primary);
    }

    .mixing-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--hairline);
      display: inline-block;
      margin-right: 4px;
      vertical-align: middle;
    }

    .machine-meta span.active .mixing-indicator {
      background: var(--primary);
      box-shadow: 0 0 6px var(--primary);
      animation: ledPulse 0.8s ease infinite;
    }

    @keyframes ledPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    .chute-ball {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 700;
      background: radial-gradient(circle at 32% 28%, #eee, #bbb 100%);
      color: var(--stone);
      transition: opacity 0.2s, transform 0.2s;
    }

    .chute-ball.empty {
      opacity: 0;
      visibility: hidden;
      transform: translateY(-14px) scale(0.35);
    }

    .chute-ball.reveal {
      visibility: visible;
      opacity: 1;
      animation: chuteRollOut 0.65s cubic-bezier(0.22, 1.1, 0.36, 1);
    }

    @keyframes chuteRollOut {
      0% {
        opacity: 0;
        transform: translateY(-28px) scale(0.45) rotate(-18deg);
      }
      55% {
        opacity: 1;
        transform: translateY(4px) scale(1.06) rotate(6deg);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
      }
    }

    .chute-ball.zone-1,
    .rack-slot.zone-1.filled,
    .history-ball.zone-1 {
      background: radial-gradient(circle at 32% 28%, #fff4a8, var(--ball-1) 48%, #c9a000 100%);
      color: var(--ink);
    }

    .chute-ball.zone-2,
    .rack-slot.zone-2.filled,
    .history-ball.zone-2 {
      background: radial-gradient(circle at 32% 28%, #bbdefb, var(--ball-2) 48%, #1565c0 100%);
      color: var(--on-dark);
    }

    .chute-ball.zone-3,
    .rack-slot.zone-3.filled,
    .history-ball.zone-3 {
      background: radial-gradient(circle at 32% 28%, #ffcdd2, var(--ball-3) 48%, #c62828 100%);
      color: var(--on-dark);
    }

    .chute-ball.zone-4,
    .rack-slot.zone-4.filled,
    .history-ball.zone-4 {
      background: radial-gradient(circle at 32% 28%, #cfd8dc, var(--ball-4) 48%, #455a64 100%);
      color: var(--on-dark);
    }

    .chute-ball.zone-5,
    .rack-slot.zone-5.filled,
    .history-ball.zone-5 {
      background: radial-gradient(circle at 32% 28%, #c8e6c9, var(--ball-5) 48%, #2e7d32 100%);
      color: var(--ink);
    }

    .result-rack-wrap {
      margin-top: 12px;
    }

    .result-rack {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 10px;
      min-height: 72px;
      padding: 20px 16px;
      background: var(--surface-soft);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-sm);
    }

    .rack-slot {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      background: radial-gradient(circle at 50% 60%, #ddd 0%, #eee 100%);
      color: var(--stone);
      border: none;
      position: relative;
      box-shadow:
        inset 0 4px 8px rgba(0, 0, 0, 0.18),
        inset 0 -2px 4px rgba(255, 255, 255, 0.8),
        0 2px 4px rgba(0, 0, 0, 0.06);
    }

    .rack-slot::before {
      content: "?";
      position: absolute;
      font-size: 14px;
      color: var(--ash);
    }

    .rack-slot.filled::before {
      content: none;
    }

    .rack-slot.filled {
      animation: slotLand 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow:
        inset -3px -4px 6px rgba(0, 0, 0, 0.3),
        inset 2px 2px 4px rgba(255, 255, 255, 0.35),
        0 4px 8px rgba(0, 0, 0, 0.12);
    }

    @keyframes slotLand {
      0% { transform: translateY(-16px) scale(0.35); opacity: 0; }
      70% { transform: translateY(2px) scale(1.06); }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    .rack-slot.bonus {
      box-shadow:
        inset 0 4px 8px rgba(0, 0, 0, 0.18),
        0 0 0 2px var(--primary);
    }

    .rack-slot.bonus.filled {
      box-shadow:
        inset -4px -5px 8px rgba(0, 0, 0, 0.35),
        inset 3px 3px 6px rgba(255, 255, 255, 0.3),
        0 0 0 2px var(--primary),
        0 0 12px rgba(118, 185, 0, 0.35);
    }

    .rack-divider {
      font-size: 20px;
      font-weight: 700;
      color: var(--mute);
      padding: 0 4px;
      line-height: 50px;
    }

    .rack-label {
      width: 100%;
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--mute);
      margin-top: 10px;
      letter-spacing: 0.06em;
    }

    .ball {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
      color: var(--on-dark);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    button {
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.25;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    button:disabled {
      background: var(--surface-soft);
      color: var(--ash);
      border: 1px solid var(--hairline);
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--primary);
      color: var(--on-primary);
      border: 1px solid var(--primary);
      padding: 11px 24px;
      min-height: 44px;
      flex: 1;
      min-width: 140px;
    }

    .btn-primary:active:not(:disabled) {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
    }

    .btn-outline {
      background: transparent;
      color: var(--ink);
      border: 2px solid var(--primary);
      padding: 11px 13px;
      min-height: 44px;
    }

    .btn-outline:active:not(:disabled) {
      background: var(--surface-soft);
    }

    .options {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
      color: var(--mute);
      font-size: 15px;
      line-height: 1.67;
    }

    .options label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .options input[type="number"],
    .winners-toolbar input[type="search"] {
      width: 64px;
      padding: 10px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--hairline);
      background: var(--canvas);
      color: var(--ink);
      font-family: inherit;
      font-size: 16px;
      line-height: 1.5;
      text-align: center;
      min-height: 44px;
      -moz-appearance: textfield;
      appearance: textfield;
    }

    .options input[type="number"]::-webkit-outer-spin-button,
    .options input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .winners-toolbar input[type="search"] {
      flex: 1;
      min-width: 140px;
      text-align: left;
      min-height: 40px;
      padding: 10px 16px;
    }

    .options input[type="number"]:focus,
    .winners-toolbar input[type="search"]:focus {
      outline: none;
      border: 2px solid var(--primary);
    }

    .history-list,
    .winners-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
      max-height: 280px;
      overflow-y: auto;
    }

    .winners-list {
      max-height: 480px;
    }

    .history-item,
    .winner-item {
      padding: 12px 0;
      border-bottom: 1px solid var(--hairline);
    }

    .history-item:last-child,
    .winner-item:last-child {
      border-bottom: none;
    }

    .history-index {
      font-size: 12px;
      font-weight: 400;
      line-height: 1.25;
      color: var(--mute);
      min-width: 1.5rem;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .history-balls,
    .winner-numbers {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
    }

    .history-ball {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      color: var(--on-dark);
      position: relative;
      box-shadow:
        inset -3px -4px 6px rgba(0, 0, 0, 0.35),
        inset 2px 2px 4px rgba(255, 255, 255, 0.25),
        0 3px 6px rgba(0, 0, 0, 0.15);
    }

    .history-ball.bonus {
      outline: 2px solid var(--primary);
      outline-offset: 1px;
    }

    .empty-history {
      color: var(--mute);
      font-size: 15px;
      line-height: 1.67;
      text-align: center;
      padding: 16px 0;
    }

    .winners-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }

    .winners-summary {
      color: var(--mute);
      font-size: 12px;
      font-weight: 400;
      line-height: 1.25;
      margin-bottom: 12px;
    }

    .winner-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .winner-round {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.47;
      color: var(--ink);
    }

    .winner-date {
      font-size: 12px;
      font-weight: 400;
      line-height: 1.25;
      color: var(--mute);
    }

    .winner-numbers {
      margin-bottom: 8px;
    }

    .bonus-label {
      color: var(--stone);
      font-size: 12px;
      font-weight: 700;
      margin: 0 4px;
    }

    .winner-prize {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.5;
      color: var(--primary);
    }

    .winner-prize.muted {
      color: var(--mute);
      font-weight: 400;
    }

    .winner-winners {
      font-size: 15px;
      font-weight: 400;
      color: var(--mute);
      margin-left: 8px;
    }

    .load-more-wrap {
      display: flex;
      justify-content: center;
      margin-top: 16px;
    }

    .load-more-wrap.hidden {
      display: none;
    }

    .saju-profile {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
      padding: 16px;
      background: var(--surface-soft);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-sm);
    }

    .saju-profile-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .saju-profile-row label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      color: var(--body);
      cursor: pointer;
    }

    .saju-profile-row input[type="date"] {
      padding: 10px 12px;
      border: 1px solid var(--hairline);
      border-radius: var(--radius-sm);

  <footer class="footer-section"><div class="footer-inner">한국 로또 6/45 · 데이터: smok95/lotto (동행복권 공개 정보 기반, 1~1229회)</div></footer>

  <script src="winners-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    const MIN = 1;
    const MAX = 45;
    const COUNT = 6;

    const drawStatus = document.getElementById("drawStatus");
    const drumViewport = document.getElementById("drumViewport");
    const globeHousing = document.getElementById("globeHousing");
    const chuteBall = document.getElementById("chuteBall");
    const ballCountLabel = document.getElementById("ballCountLabel");
    const mixingLabel = document.getElementById("mixingLabel");
    const resultRack = document.getElementById("resultRack");
    const drawBtn = document.getElementById("drawBtn");
    const autoBtn = document.getElementById("autoBtn");
    const clearBtn = document.getElementById("clearBtn");
    const autoCountInput = document.getElementById("autoCount");
    const historyList = document.getElementById("historyList");

    let isDrawing = false;
    let history = [];
    let audioCtx = null;

    const BALL_COLORS = {
      1: ["#fff4a8", "#fbc02d", "#c9a000"],
      2: ["#bbdefb", "#42a5f5", "#1565c0"],
      3: ["#ffcdd2", "#ef5350", "#c62828"],
      4: ["#cfd8dc", "#78909c", "#455a64"],
      5: ["#c8e6c9", "#66bb6a", "#2e7d32"],
    };

    const VISUAL_SPEED = 0.32;

    const drumPhysics = {
      scene: null,
      camera: null,
      renderer: null,
      globe: null,
      viewport: null,
      boundaryR: 1.08,
      ballR: 0.082,
      balls: [],
      mixing: false,
      mixPower: 0,
      drumAngle: 0,
      camAngle: 0.55,
      animId: null,
      tickCount: 0,
      lastBounceSound: 0,
      gravity: 0.014,
    };

    function setMixingUI(active) {
      mixingLabel.classList.toggle("active", active);
      globeHousing.classList.toggle("agitating", active);
      mixingLabel.innerHTML = active
        ? '<span class="mixing-indicator"></span>혼합 중'
        : '<span class="mixing-indicator"></span>대기';
    }

    function updateBallCountLabel() {
      const count = drumPhysics.balls.filter((b) => b.inDrum).length;
      ballCountLabel.textContent = `공 ${count}개`;
    }

    function getZone(num) {
      if (num <= 10) return 1;
      if (num <= 20) return 2;
      if (num <= 30) return 3;
      if (num <= 40) return 4;
      if (num <= 45) return 5;
      return 5;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function playTone(freq, duration, type = "sine", volume = 0.06) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(volume, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function playMixTick() {
      playTone(180 + Math.random() * 80, 0.04, "square", 0.025);
    }

    function playReveal() {
      playTone(520, 0.12, "sine", 0.08);
      setTimeout(() => playTone(780, 0.18, "sine", 0.06), 80);
    }

    function playComplete() {
      playTone(440, 0.15, "sine", 0.07);
      setTimeout(() => playTone(554, 0.15, "sine", 0.07), 120);
      setTimeout(() => playTone(659, 0.25, "sine", 0.08), 240);
    }

    function drawFullSet() {
      const pool = Array.from({ length: MAX - MIN + 1 }, (_, i) => i + MIN);
      const main = [];
      for (let i = 0; i < COUNT; i++) {
        const idx = Math.floor(Math.random() * pool.length);
        main.push(pool.splice(idx, 1)[0]);
      }
      const bonusIdx = Math.floor(Math.random() * pool.length);
      const bonus = pool[bonusIdx];
      return { main, bonus, sorted: [...main].sort((a, b) => a - b) };
    }

    function disposeBallMesh(ball) {
      if (!ball.mesh) return;
      drumPhysics.scene.remove(ball.mesh);
      ball.mesh.geometry.dispose();
      if (ball.mesh.material.map) ball.mesh.material.map.dispose();
      ball.mesh.material.dispose();
      ball.mesh = null;
    }

    function createBallMesh(num) {
      const zone = getZone(num);
      const colors = BALL_COLORS[zone];
      const size = 256;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");
      const cx = size / 2;
      const cy = size / 2;

      const g = ctx.createRadialGradient(cx - size * 0.12, cy - size * 0.14, size * 0.04, cx, cy, size * 0.74);
      g.addColorStop(0, colors[0]);
      g.addColorStop(0.55, colors[1]);
      g.addColorStop(1, colors[2]);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, size, size);

      const fontSize = num >= 10 ? size * 0.27 : size * 0.31;
      const textColor = zone === 1 || zone === 5 ? "#111" : "#fff";
      ctx.font = `700 ${fontSize}px Inter, Arial, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      if (zone !== 1 && zone !== 5) {
        ctx.shadowColor = "rgba(0, 0, 0, 0.3)";
        ctx.shadowBlur = 3;
        ctx.shadowOffsetY = 1;
      }
      ctx.fillStyle = textColor;
      ctx.fillText(String(num), cx, cy + 1);
      ctx.shadowColor = "transparent";

      const texture = new THREE.CanvasTexture(canvas);
      texture.anisotropy = 4;
      texture.colorSpace = THREE.SRGBColorSpace;
      const geometry = new THREE.SphereGeometry(drumPhysics.ballR, 22, 22);
      const material = new THREE.MeshStandardMaterial({
        map: texture,
        color: 0xffffff,
        emissive: new THREE.Color(colors[1]),
        emissiveIntensity: 0.14,
        roughness: 0.38,
        metalness: 0.06,
      });
      const mesh = new THREE.Mesh(geometry, material);
      drumPhysics.scene.add(mesh);
      return mesh;
    }

    function syncBallMeshes() {
      drumPhysics.balls.forEach((ball) => {
        if (!ball.mesh) return;
        if (!ball.inDrum && !ball.exiting) {
          ball.mesh.visible = false;
          return;
        }
        ball.mesh.visible = true;
        ball.mesh.position.set(ball.x, ball.y, ball.z);
        ball.mesh.material.opacity = ball.opacity;
        ball.mesh.material.transparent = ball.opacity < 1;
      });
    }

    function initDrumPhysics(numbers) {
      stopDrumLoop();
      const { boundaryR, ballR, scene } = drumPhysics;
      drumPhysics.drumAngle = 0;

      drumPhysics.balls.forEach(disposeBallMesh);

      const bottomY = -boundaryR + ballR + 0.04;
      const cols = Math.ceil(Math.sqrt(numbers.length * 1.35));
      drumPhysics.balls = numbers.map((num, i) => {
        const row = Math.floor(i / cols);
        const col = i % cols;
        const rowCount = Math.min(cols, numbers.length - row * cols);
        const offsetX = (col - (rowCount - 1) / 2) * (ballR * 2.05);
        const offsetZ = (row % 2) * ballR * 0.55;
        const offsetY = row * (ballR * 1.75);
        const mesh = createBallMesh(num);
        return {
          num,
          x: offsetX + (Math.random() - 0.5) * 0.02,
          y: bottomY + offsetY + Math.random() * 0.01,
          z: offsetZ + (Math.random() - 0.5) * 0.02,
          vx: 0,
          vy: 0,
          vz: 0,
          r: ballR,
          mesh,
          inDrum: true,
          exiting: false,
          opacity: 1,
        };
      });

      settleDrumBalls(220);
      syncBallMeshes();
      updateBallCountLabel();
      renderDrumFrame();
    }

    function settleDrumBalls(steps) {
      const inDrumBalls = drumPhysics.balls.filter((b) => b.inDrum);
      for (let i = 0; i < steps; i++) {
        runIdlePhysicsSubstep(inDrumBalls, 5);
      }
      inDrumBalls.forEach((ball) => {
        ball.vx = 0;
        ball.vy = 0;
        ball.vz = 0;
      });
    }

    function resetAllDrumBalls() {
      initDrumPhysics(Array.from({ length: MAX - MIN + 1 }, (_, i) => i + MIN));
    }

    function renderDrumFrame() {
      const { scene, camera, renderer, mixPower } = drumPhysics;
      if (!renderer) return;

      if (mixPower > 0) {
        drumPhysics.camAngle += 0.0032 * mixPower;
      }
      const camR = 2.75;
      const camY = 0.22 + Math.sin(drumPhysics.camAngle * 0.45) * 0.1;
      camera.position.x = Math.sin(drumPhysics.camAngle) * camR;
      camera.position.z = Math.cos(drumPhysics.camAngle) * camR;
      camera.position.y = camY;
      camera.lookAt(0, -0.08, 0);

      syncBallMeshes();
      renderer.render(scene, camera);
    }

    function clampSpeed(ball, maxSpeed) {
      const speed = Math.hypot(ball.vx, ball.vy, ball.vz);
      if (speed > maxSpeed) {
        ball.vx = (ball.vx / speed) * maxSpeed;
        ball.vy = (ball.vy / speed) * maxSpeed;
        ball.vz = (ball.vz / speed) * maxSpeed;
      }
    }

    function resolveWall(ball, boundaryR, restitution) {
      const dist = Math.hypot(ball.x, ball.y, ball.z);
      const maxDist = boundaryR - ball.r;
      if (dist <= maxDist || dist === 0) return 0;

      const nx = ball.x / dist;
      const ny = ball.y / dist;
      const nz = ball.z / dist;
      ball.x = nx * maxDist;
      ball.y = ny * maxDist;
      ball.z = nz * maxDist;

      const dot = ball.vx * nx + ball.vy * ny + ball.vz * nz;
      if (dot > 0) {
        ball.vx = (ball.vx - 2 * dot * nx) * restitution;
        ball.vy = (ball.vy - 2 * dot * ny) * restitution;
        ball.vz = (ball.vz - 2 * dot * nz) * restitution;
        return Math.abs(dot);
      }
      return 0;
    }

    function resolveBallPair(a, b, restitution) {
      let dx = b.x - a.x;
      let dy = b.y - a.y;
      let dz = b.z - a.z;
      let dist = Math.hypot(dx, dy, dz);
      const minDist = a.r + b.r;

      if (dist === 0) {
        const angle = Math.random() * Math.PI * 2;
        dx = Math.cos(angle);
        dy = Math.random() - 0.5;
        dz = Math.sin(angle);
        dist = 0.001;
      }

      if (dist >= minDist) return 0;

      const nx = dx / dist;
      const ny = dy / dist;
      const nz = dz / dist;
      const overlap = minDist - dist;
      const half = overlap * 0.5;
      a.x -= nx * half;
      a.y -= ny * half;
      a.z -= nz * half;
      b.x += nx * half;
      b.y += ny * half;
      b.z += nz * half;

      const dvx = a.vx - b.vx;
      const dvy = a.vy - b.vy;
      const dvz = a.vz - b.vz;
      const impact = dvx * nx + dvy * ny + dvz * nz;
      if (impact <= 0) return 0;

      const impulse = impact * restitution;
      a.vx -= impulse * nx;
      a.vy -= impulse * ny;
      a.vz -= impulse * nz;
      b.vx += impulse * nx;
      b.vy += impulse * ny;
      b.vz += impulse * nz;
      return Math.abs(impact);
    }

    function resolveAllCollisions(inDrumBalls, boundaryR, wallRestitution, ballRestitution, passes) {
      let bounceEnergy = 0;
      for (let pass = 0; pass < passes; pass++) {
        for (let i = 0; i < inDrumBalls.length; i++) {
          for (let j = i + 1; j < inDrumBalls.length; j++) {
            bounceEnergy += resolveBallPair(inDrumBalls[i], inDrumBalls[j], ballRestitution);
          }
        }
        inDrumBalls.forEach((ball) => {
          bounceEnergy += resolveWall(ball, boundaryR, wallRestitution);
        });
      }
      return bounceEnergy;
    }

    function runIdlePhysicsSubstep(inDrumBalls, collisionPasses) {
      const { boundaryR, gravity } = drumPhysics;
      const wallRestitution = 0.52;
      const ballRestitution = 0.48;
      const friction = 0.982;
      const maxSpeed = 0.26;
      const dt = 0.36 * VISUAL_SPEED;

      inDrumBalls.forEach((ball) => {
        ball.vy -= gravity;
        ball.vx *= friction;
        ball.vy *= friction;
        ball.vz *= friction;
        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;
        ball.z += ball.vz * dt;
        clampSpeed(ball, maxSpeed);
      });

      return resolveAllCollisions(inDrumBalls, boundaryR, wallRestitution, ballRestitution, collisionPasses);
    }

    function runMixingPhysicsSubstep(inDrumBalls, mixPower) {
      const { boundaryR } = drumPhysics;
      const wallRestitution = 0.92;
      const ballRestitution = 0.91;
      const friction = 0.998;
      const maxSpeed = 0.54;
      const dt = 0.34 * VISUAL_SPEED;
      let bounceEnergy = 0;

      drumPhysics.drumAngle += 0.034 * mixPower;
      const gStrength = 0.011 + mixPower * 0.0052;
      const a1 = drumPhysics.drumAngle;
      const a2 = drumPhysics.drumAngle * 1.65 + 0.8;
      const gx = Math.sin(a1) * gStrength * 0.9;
      const gy = Math.cos(a1) * gStrength * 1.15;
      const gz = Math.cos(a2) * gStrength * 0.72;

      inDrumBalls.forEach((ball) => {
        ball.vx += gx;
        ball.vy += gy;
        ball.vz += gz;

        if (ball.y < -0.4 && gy > 0 && Math.random() < 0.004 * mixPower) {
          ball.vy += mixPower * 0.006;
        }

        if (Math.random() < 0.005 * mixPower) {
          const gust = Math.random() * Math.PI * 2;
          const gustElev = (Math.random() - 0.15) * Math.PI * 0.55;
          const gustForce = mixPower * (0.0016 + Math.random() * 0.002);
          ball.vx += Math.cos(gust) * Math.cos(gustElev) * gustForce;
          ball.vy += Math.sin(gustElev) * gustForce;
          ball.vz += Math.sin(gust) * Math.cos(gustElev) * gustForce;
        }
      });

      inDrumBalls.forEach((ball) => {
        ball.vx *= friction;
        ball.vy *= friction;
        ball.vz *= friction;
        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;
        ball.z += ball.vz * dt;
        clampSpeed(ball, maxSpeed);
      });

      bounceEnergy += resolveAllCollisions(inDrumBalls, boundaryR, wallRestitution, ballRestitution, 4);
      return bounceEnergy;
    }

    function physicsSubstep(inDrumBalls, mixPower) {
      if (mixPower > 0) {
        return runMixingPhysicsSubstep(inDrumBalls, mixPower);
      }
      return runIdlePhysicsSubstep(inDrumBalls, 3);
    }

    function stepDrumPhysics() {
      const { balls, mixPower } = drumPhysics;
      const inDrumBalls = balls.filter((b) => b.inDrum);
      let totalBounce = 0;
      const substeps = mixPower > 0 ? 7 : 3;

      for (let s = 0; s < substeps; s++) {
        totalBounce += physicsSubstep(inDrumBalls, mixPower);
      }

      if (mixPower > 0 && totalBounce > 0.12 && drumPhysics.tickCount - drumPhysics.lastBounceSound > 6) {
        playMixTick();
        drumPhysics.lastBounceSound = drumPhysics.tickCount;
      }

      balls.filter((b) => b.exiting).forEach((ball) => {
        const dt = 0.45 * VISUAL_SPEED;
        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;
        ball.z += ball.vz * dt;
        ball.vy -= 0.012;
        ball.opacity -= 0.035;
        if (ball.opacity <= 0) {
          ball.exiting = false;
          ball.inDrum = false;
          disposeBallMesh(ball);
        }
      });

      renderDrumFrame();
      drumPhysics.tickCount++;
    }

    function startDrumLoop(power) {
      drumPhysics.mixPower = power;
      drumPhysics.mixing = power > 0;
      setMixingUI(power > 0);

      const needsLoop = power > 0 || drumPhysics.balls.some((b) => b.exiting);
      if (!needsLoop) {
        if (drumPhysics.animId) {
          cancelAnimationFrame(drumPhysics.animId);
          drumPhysics.animId = null;
        }
        renderDrumFrame();
        return;
      }

      if (drumPhysics.animId) return;

      const loop = () => {
        stepDrumPhysics();
        const keepGoing = drumPhysics.mixPower > 0 || drumPhysics.balls.some((b) => b.exiting);
        if (keepGoing) {
          drumPhysics.animId = requestAnimationFrame(loop);
        } else {
          drumPhysics.mixing = false;
          setMixingUI(false);
          drumPhysics.animId = null;
        }
      };
      drumPhysics.animId = requestAnimationFrame(loop);
    }

    function ensureDrumMixing(power) {
      startDrumLoop(power);
      if (power > 0 && !drumPhysics.animId) {
        startDrumLoop(power);
      }
    }

    async function mixForDuration(duration, power) {
      clearChuteBall();
      ensureDrumMixing(power);
      let tick = 0;
      const mixInterval = setInterval(() => {
        if (tick % 4 === 0) playMixTick();
        tick++;
      }, 70);
      await sleep(duration);
      clearInterval(mixInterval);
    }

    function stopDrumLoop() {
      drumPhysics.mixPower = 0;
      drumPhysics.mixing = false;
      setMixingUI(false);
      if (drumPhysics.balls.some((b) => b.exiting)) {
        startDrumLoop(0);
        return;
      }
      if (drumPhysics.animId) {
        cancelAnimationFrame(drumPhysics.animId);
        drumPhysics.animId = null;
      }
      renderDrumFrame();
    }

    function removeBallFromDrum(num) {
      const ball = drumPhysics.balls.find((b) => b.num === num && b.inDrum);
      if (!ball) return;
      ball.inDrum = false;
      ball.exiting = true;
      ball.vx = (Math.random() - 0.5) * 0.09;
      ball.vy = 0.06 + Math.random() * 0.05;
      ball.vz = 0.12 + Math.random() * 0.06;
      updateBallCountLabel();
      if (drumPhysics.mixPower > 0 && !drumPhysics.animId) {
        startDrumLoop(drumPhysics.mixPower);
      }
    }

    function getDrumViewportSize() {
      const viewport = drumPhysics.viewport || drumViewport;
      if (!viewport) return 300;
      const size = Math.min(viewport.clientWidth, viewport.clientHeight);
      return Math.max(Math.round(size), 1) || 300;
    }

    function onDrumResize() {
      const { viewport, camera, renderer } = drumPhysics;
      if (!viewport || !renderer) return;
      const size = getDrumViewportSize();
      camera.aspect = 1;
      camera.updateProjectionMatrix();
      renderer.setSize(size, size);
      renderDrumFrame();
    }

    function initCanvas() {
      const viewport = drumViewport;
      const size = getDrumViewportSize();

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
      camera.position.set(0.15, 0.35, 2.75);
      camera.lookAt(0, -0.05, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(size, size);
      renderer.setClearColor(0x000000, 0);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      viewport.appendChild(renderer.domElement);

      scene.add(new THREE.AmbientLight(0xffffff, 0.9));
      const keyLight = new THREE.DirectionalLight(0xffffff, 1.15);
      keyLight.position.set(2.5, 4, 3);
      scene.add(keyLight);
      const fillLight = new THREE.DirectionalLight(0xb8d4ff, 0.5);
      fillLight.position.set(-3, 0.5, -2);
      scene.add(fillLight);
      const rimLight = new THREE.PointLight(0xffffff, 0.35);
      rimLight.position.set(0, -1.5, 1.5);
      scene.add(rimLight);

      const globeGeom = new THREE.SphereGeometry(drumPhysics.boundaryR, 56, 56);
      const globeMat = new THREE.MeshPhysicalMaterial({
        color: 0xe8f0f8,
        transparent: true,
        opacity: 0.16,
        roughness: 0.06,
        metalness: 0.04,
        transmission: 0.82,
        thickness: 0.35,
        clearcoat: 1,
        clearcoatRoughness: 0.08,
        side: THREE.DoubleSide,
        depthWrite: false,
      });
      const globe = new THREE.Mesh(globeGeom, globeMat);
      scene.add(globe);

      drumPhysics.scene = scene;
      drumPhysics.camera = camera;
      drumPhysics.renderer = renderer;
      drumPhysics.globe = globe;
      drumPhysics.viewport = viewport;

      window.addEventListener("resize", onDrumResize);
    }

    function buildResultRack() {
      resultRack.innerHTML = "";
      for (let i = 0; i < COUNT; i++) {
        const slot = document.createElement("div");
        slot.className = "rack-slot";
        slot.dataset.index = i;
        slot.textContent = "";
        slot.setAttribute("aria-label", `${i + 1}번째 번호`);
        resultRack.appendChild(slot);
      }
      const divider = document.createElement("span");
      divider.className = "rack-divider";
      divider.textContent = "+";
      divider.setAttribute("aria-hidden", "true");
      resultRack.appendChild(divider);
      const bonusSlot = document.createElement("div");
      bonusSlot.className = "rack-slot bonus";
      bonusSlot.id = "bonusSlot";
      bonusSlot.textContent = "";
      bonusSlot.setAttribute("aria-label", "보너스 번호");
      resultRack.appendChild(bonusSlot);
    }

    function clearChuteBall() {
      chuteBall.textContent = "";
      chuteBall.className = "chute-ball empty";
    }

    function revealChuteNumber(num, playSound = true) {
      chuteBall.textContent = num;
      chuteBall.className = `chute-ball zone-${getZone(num)} reveal`;
      if (playSound) playReveal();
    }

    function resetDrawStage() {
      drawStatus.textContent = "추첨기 준비 완료 · 1~45번 공 45개가 구체 안에 있습니다";
      drawStatus.classList.remove("drawing");
      clearChuteBall();
      resetAllDrumBalls();
      buildResultRack();
    }

    function fillSlot(slotEl, num) {
      const isBonus = slotEl.id === "bonusSlot";
      slotEl.textContent = num;
      slotEl.className = `rack-slot zone-${getZone(num)} filled${isBonus ? " bonus" : ""}`;
    }

    async function pickNumberFromDrum(num, spinTime, fast) {
      clearChuteBall();

      let tick = 0;
      const mixInterval = setInterval(() => {
        if (tick % 3 === 0) playMixTick();
        tick++;
      }, 65);

      await sleep(spinTime);
      clearInterval(mixInterval);

      removeBallFromDrum(num);
      revealChuteNumber(num, !fast);
      await sleep(fast ? 280 : 520);
      chuteBall.classList.remove("reveal");
    }

    async function sortMainSlots(slots, numbers) {
      drawStatus.textContent = "당첨번호 정렬 중…";
      await sleep(400);
      numbers.forEach((num, i) => {
        fillSlot(slots[i], num);
      });
      await sleep(300);
    }

    function shuffleArray(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    async function runLiveDraw({
      fast = false,
      preset = null,
      statusPrefix = "",
      sajuContext = null,
      continueMixing = false,
    } = {}) {
      ensureAudio();
      let main;
      let bonus;
      let sorted;

      if (preset) {
        main = [...preset.numbers];
        bonus = preset.bonus;
        sorted = [...main].sort((a, b) => a - b);
      } else {
        ({ main, bonus, sorted } = drawFullSet());
      }

      buildResultRack();
      if (!continueMixing) {
        resetAllDrumBalls();
      }

      const slots = resultRack.querySelectorAll(".rack-slot:not(.bonus)");
      const bonusSlot = document.getElementById("bonusSlot");
      const drawOrder = shuffleArray(main);
      const spinTime = fast ? 500 : 1200;
      const mixPower = fast ? 2.8 : 3.8;
      const prefix = statusPrefix ? `${statusPrefix} · ` : "";

      drawStatus.textContent = `${prefix}추첨기 가동 · 45개 공 혼합 중…`;
      drawStatus.classList.add("drawing");
      clearChuteBall();

      if (sajuContext) {
        appendSajuProfileIntro(sajuContext.profile, sajuContext.recommendation);
      }

      await mixForDuration(continueMixing ? (fast ? 400 : 800) : fast ? 800 : 1800, mixPower);

      for (let i = 0; i < COUNT; i++) {
        const num = drawOrder[i];
        const inDrum = drumPhysics.balls.filter((b) => b.inDrum).length;
        drawStatus.textContent = `${prefix}${i + 1}번째 번호 추첨 · 구체에 ${inDrum}개`;
        await pickNumberFromDrum(num, spinTime, fast);
        fillSlot(slots[i], num);
        if (sajuContext) {
          appendSajuNumberReveal(
            num,
            getSajuReason(sajuContext.recommendation, num),
            `${i + 1}번째 당첨번호`
          );
        }
        clearChuteBall();
        await sleep(fast ? 150 : 350);
      }

      const inDrumBonus = drumPhysics.balls.filter((b) => b.inDrum).length;
      drawStatus.textContent = `${prefix}보너스 번호 추첨 · 구체에 ${inDrumBonus}개`;
      await pickNumberFromDrum(bonus, spinTime, fast);
      fillSlot(bonusSlot, bonus);
      if (sajuContext) {
        appendSajuNumberReveal(
          bonus,
          getSajuReason(sajuContext.recommendation, bonus),
          "보너스 번호"
        );
      }
      await sleep(fast ? 200 : 350);

      stopDrumLoop();
      await sortMainSlots(slots, sorted);

      if (sajuContext?.recommendation?.explanation) {
        appendChatMessage("bot", sajuContext.recommendation.explanation);
      }
      if (sajuContext) {
        appendChatMessage("bot", "※ 사주 기반 참고용 번호이며, 당첨을 보장하지 않습니다.");
      }

      drawStatus.textContent = `${prefix}추첨 완료 · ${sorted.join(", ")} + ${bonus}`;
      drawStatus.classList.remove("drawing");
      if (!fast) playComplete();

      return sorted;
    }

    function addToHistory(numbers) {
      history.unshift(numbers);
      if (history.length > 50) history.pop();
      renderHistory();
    }

    function renderHistory() {
      if (history.length === 0) {
        historyList.innerHTML = "";
        const li = document.createElement("li");
        li.className = "empty-history";
        li.id = "emptyHistory";
        li.textContent = "아직 추첨 기록이 없습니다";
        historyList.appendChild(li);
        return;
      }

      historyList.innerHTML = "";
      history.forEach((nums, index) => {
        const li = document.createElement("li");
        li.className = "history-item";

        const idx = document.createElement("span");
        idx.className = "history-index";
        idx.textContent = `${history.length - index}.`;

        const ballsWrap = document.createElement("div");
        ballsWrap.className = "history-balls";
        nums.forEach((num) => {
          const ball = document.createElement("span");
          ball.className = `history-ball zone-${getZone(num)}`;
          ball.textContent = num;
          ballsWrap.appendChild(ball);
        });

        li.appendChild(idx);
        li.appendChild(ballsWrap);
        historyList.appendChild(li);
      });
    }

    function setControlsDisabled(disabled) {
      drawBtn.disabled = disabled;
      autoBtn.disabled = disabled;
      clearBtn.disabled = disabled;
      chatSendBtn.disabled = disabled;
      chatInput.disabled = disabled;
      chatResetBtn.disabled = disabled;
    }

    async function performDraw({ addHistory = true, fast = false } = {}) {
      if (isDrawing) return null;
      isDrawing = true;
      setControlsDisabled(true);

      const numbers = await runLiveDraw({ fast });

      if (addHistory) {
        addToHistory(numbers);
      }

      isDrawing = false;
      setControlsDisabled(false);
      return numbers;
    }

    drawBtn.addEventListener("click", () => {
      ensureAudio();
      performDraw({ fast: false });
    });

    autoBtn.addEventListener("click", async () => {
      ensureAudio();
      const count = Math.min(20, Math.max(1, parseInt(autoCountInput.value, 10) || 5));
      autoCountInput.value = count;

      for (let i = 0; i < count; i++) {
        await performDraw({ fast: i > 0 });
        if (i < count - 1) {
          await sleep(300);
        }
      }
    });

    clearBtn.addEventListener("click", () => {
      history = [];
      renderHistory();
      resetDrawStage();
    });

    initCanvas();
    resetDrawStage();

    autoCountInput.addEventListener("change", () => {
      const val = parseInt(autoCountInput.value, 10);
      if (Number.isNaN(val) || val < 1) autoCountInput.value = 1;
      if (val > 20) autoCountInput.value = 20;
    });

    const tabDraw = document.getElementById("tabDraw");
    const tabWinners = document.getElementById("tabWinners");
    const panelDraw = document.getElementById("panelDraw");
    const panelWinners = document.getElementById("panelWinners");
    const winnerSearch = document.getElementById("winnerSearch");
    const winnerSearchBtn = document.getElementById("winnerSearchBtn");
    const winnersSummary = document.getElementById("winnersSummary");
    const winnersList = document.getElementById("winnersList");
    const loadMoreWrap = document.getElementById("loadMoreWrap");
    const loadMoreBtn = document.getElementById("loadMoreBtn");

    const allWinners = window.LOTTO_WINNERS || [];
    const PAGE_SIZE = 30;
    let filteredWinners = allWinners;
    let visibleCount = PAGE_SIZE;

    function switchTab(target) {
      const isDraw = target === "draw";
      tabDraw.classList.toggle("active", isDraw);
      tabWinners.classList.toggle("active", !isDraw);
      tabDraw.setAttribute("aria-selected", String(isDraw));
      tabWinners.setAttribute("aria-selected", String(!isDraw));
      panelDraw.classList.toggle("active", isDraw);
      panelWinners.classList.toggle("active", !isDraw);
    }

    function formatPrize(amount) {
      if (amount == null) return "당첨금 정보 없음";
      const eok = Math.floor(amount / 100000000);
      const man = Math.floor((amount % 100000000) / 10000);
      if (eok > 0 && man > 0) return `${eok.toLocaleString("ko-KR")}억 ${man.toLocaleString("ko-KR")}만원`;
      if (eok > 0) return `${eok.toLocaleString("ko-KR")}억원`;
      return `${man.toLocaleString("ko-KR")}만원`;
    }

    function formatDate(dateStr) {
      if (!dateStr) return "";
      const [y, m, d] = dateStr.split("-");
      if (!y || !m || !d) return dateStr;
      return `${y}.${m}.${d}`;
    }

    function createHistoryBall(num, isBonus = false) {
      const ball = document.createElement("span");
      ball.className = `history-ball zone-${getZone(num)}${isBonus ? " bonus" : ""}`;
      ball.textContent = num;
      return ball;
    }

    function renderWinnerItem(record) {
      const li = document.createElement("li");
      li.className = "winner-item";

      const meta = document.createElement("div");
      meta.className = "winner-meta";

      const round = document.createElement("span");
      round.className = "winner-round";
      round.textContent = `${record.n}회`;

      const date = document.createElement("span");
      date.className = "winner-date";
      date.textContent = formatDate(record.date);

      meta.appendChild(round);
      meta.appendChild(date);

      const numbers = document.createElement("div");
      numbers.className = "winner-numbers";
      record.nums.forEach((num) => numbers.appendChild(createHistoryBall(num)));

      const bonusLabel = document.createElement("span");
      bonusLabel.className = "bonus-label";
      bonusLabel.textContent = "+";
      numbers.appendChild(bonusLabel);
      numbers.appendChild(createHistoryBall(record.bonus, true));

      const prizeLine = document.createElement("div");
      const prize = document.createElement("span");
      prize.className = `winner-prize${record.prize == null ? " muted" : ""}`;
      prize.textContent = formatPrize(record.prize);

      if (record.winners != null) {
        const winners = document.createElement("span");
        winners.className = "winner-winners";
        winners.textContent = `· ${record.winners}명`;
        prize.appendChild(winners);
      }

      prizeLine.appendChild(prize);

      li.appendChild(meta);
      li.appendChild(numbers);
      li.appendChild(prizeLine);
      return li;

    function renderWinnersList() {
      winnersList.innerHTML = "";
      const slice = filteredWinners.slice(0, visibleCount);

      if (slice.length === 0) {
        const empty = document.createElement("li");
        empty.className = "empty-history";
        empty.textContent = "검색 결과가 없습니다";
        winnersList.appendChild(empty);
      } else {
        slice.forEach((record) => winnersList.appendChild(renderWinnerItem(record)));
      }

      const latest = allWinners[0];
      winnersSummary.textContent = filteredWinners.length === allWinners.length
        ? `총 ${allWinners.length}회 · 최신 ${latest.n}회 (${formatDate(latest.date)})`
        : `검색 결과 ${filteredWinners.length}건`;

      loadMoreWrap.classList.toggle("hidden", visibleCount >= filteredWinners.length);
    }

    function filterWinners() {
      const query = winnerSearch.value.trim();
      if (!query) {
        filteredWinners = allWinners;
      } else {
        const round = parseInt(query, 10);
        if (Number.isNaN(round)) {
          filteredWinners = [];
        } else {
          filteredWinners = allWinners.filter((item) => item.n === round);
        }
      }
      visibleCount = PAGE_SIZE;
      renderWinnersList();
    }

      const msg = document.createElement("div");
      msg.className = `chat-msg ${type}`;
      if (typeof content === "string") {
        msg.textContent = content;
      } else if (content) {
        msg.appendChild(content);

      if (extraNode) msg.appendChild(extraNode);
      chatMessages.appendChild(msg);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return msg;

      const item = recommendation.numberReasons?.find((entry) => entry.number === num);

    function appendSajuProfileIntro(profile, recommendation) {
      const wrap = document.createElement("div");
      const tag = document.createElement("span");
      tag.className = "chat-saju-tag";
      tag.textContent = `년주 ${profile.pillars.year} · 월주 ${profile.pillars.month} · 일주 ${profile.pillars.day} · 일간 ${profile.dayMaster.stem}(${profile.dayMaster.element})`;
      wrap.appendChild(tag);

      if (recommendation.summary) {
        const summary = document.createElement("p");
        summary.textContent = recommendation.summary;
        summary.style.marginTop = "8px";
        wrap.appendChild(summary);
      }

      const note = document.createElement("p");
      note.style.marginTop = "8px";
      note.textContent = "추첨과 함께 번호별 사주 근거를 순서대로 알려드립니다.";
      wrap.appendChild(note);

      appendChatMessage("bot", wrap);
    }

    function appendSajuNumberReveal(num, reason, label) {
      const wrap = document.createElement("div");
      const heading = document.createElement("p");
      heading.style.fontWeight = "700";
      heading.style.marginBottom = "6px";
      heading.textContent = label;
      wrap.appendChild(heading);

      const balls = document.createElement("div");
      balls.className = "chat-lotto-balls";
      balls.appendChild(createHistoryBall(num, label === "보너스 번호"));
      wrap.appendChild(balls);

      const reasonEl = document.createElement("p");
      reasonEl.textContent = reason;
      reasonEl.style.marginTop = "8px";
      reasonEl.style.color = "var(--mute)";
      reasonEl.style.fontSize = "14px";
      wrap.appendChild(reasonEl);

      appendChatMessage("bot", wrap);
    }

    function buildRecommendationNode(recommendation, profile) {
      const wrap = document.createElement("div");

      if (profile) {
        const tag = document.createElement("span");
        tag.className = "chat-saju-tag";
        tag.textContent = `년주 ${profile.pillars.year} · 월주 ${profile.pillars.month} · 일주 ${profile.pillars.day} · 일간 ${profile.dayMaster.stem}(${profile.dayMaster.element})`;
        wrap.appendChild(tag);
      }

      if (recommendation.summary) {
        const summary = document.createElement("p");
        summary.textContent = recommendation.summary;
        summary.style.marginTop = "8px";
        wrap.appendChild(summary);
      }

      if (recommendation.explanation) {
        const explanation = document.createElement("p");
        explanation.textContent = recommendation.explanation;
        explanation.style.marginTop = "8px";
        wrap.appendChild(explanation);
      }

      const balls = document.createElement("div");
      balls.className = "chat-lotto-balls";
      recommendation.numbers.forEach((num) => {
        balls.appendChild(createHistoryBall(num));
      });
      const bonusLabel = document.createElement("span");
      bonusLabel.className = "bonus-label";
      bonusLabel.textContent = "+";
      balls.appendChild(bonusLabel);
      balls.appendChild(createHistoryBall(recommendation.bonus, true));
      wrap.appendChild(balls);

      if (Array.isArray(recommendation.numberReasons) && recommendation.numberReasons.length) {
        const list = document.createElement("ul");
        list.className = "chat-reason-list";
        recommendation.numberReasons.forEach((item) => {
          const li = document.createElement("li");
          li.textContent = `${item.number}번: ${item.reason}`;
          list.appendChild(li);
        });
        wrap.appendChild(list);
      }

      const disclaimer = document.createElement("p");
      disclaimer.className = "saju-note";
      disclaimer.textContent = "※ 사주 기반 참고용 번호이며, 당첨을 보장하지 않습니다.";
      wrap.appendChild(disclaimer);

      return wrap;
    }

    function resetSajuChat() {
      chatMessages.innerHTML = "";
      sajuChatStarted = false;
      appendChatMessage(
        "bot",
        "안녕하세요. 성별과 생년월일을 입력한 뒤 ‘사주 추천 · 추첨’을 누르면 분석하는 동안 왼쪽 추첨기가 돌아가고, 추천 번호를 뽑습니다."
      );
    }

    function startSajuAnalysisMix() {
      ensureAudio();
      resetAllDrumBalls();
      buildResultRack();
      clearChuteBall();
      drawStatus.textContent = "사주 분석 중 · 추첨기 혼합 중…";
      drawStatus.classList.add("drawing");

      startDrumLoop(3.4);

      let tick = 0;
      const mixInterval = setInterval(() => {
        if (tick % 4 === 0) playMixTick();
        tick++;
      }, 70);

      return () => clearInterval(mixInterval);
    }

    function stopSajuAnalysisMix() {
      stopDrumLoop();
      clearChuteBall();
    }

    const SAJU_API_URL = `${window.location.origin}/api/saju-lotto`;

    async function sendSajuChat() {
      if (isDrawing) return;

      const { gender, birthDate } = getSajuFormValues();
      const message = chatInput.value.trim();

      if (!gender || !birthDate) {
        appendChatMessage("error", "성별과 생년월일을 모두 입력해 주세요.");
        return;
      }

      if (window.location.protocol === "file:") {
        appendChatMessage(
          "error",
          "로컬 HTML 파일로는 API를 호출할 수 없습니다. 배포된 사이트에서 이용해 주세요.\nhttps://ai-study-pearl-zeta.vercel.app"
        );
        return;
      }

      isDrawing = true;
      setControlsDisabled(true);

      const userText = message || "사주에 맞는 로또 번호를 추천해 주세요.";
      appendChatMessage("user", userText);
      chatInput.value = "";

      const loadingMsg = appendChatMessage("loading", "사주를 분석하고 번호를 추천하는 중…");
      const stopChuteSpin = startSajuAnalysisMix();

      try {
        const response = await fetch(SAJU_API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ gender, birthDate, message }),
        });

        const raw = await response.text();
        let data;
        try {
          data = raw ? JSON.parse(raw) : {};
        } catch {
          throw new Error(`서버 응답을 해석할 수 없습니다. (${response.status})`);
        }

        loadingMsg.remove();
        stopChuteSpin();

        if (!response.ok) {
          stopSajuAnalysisMix();
          drawStatus.textContent = "사주 추천 실패 · 다시 시도해 주세요";
          drawStatus.classList.remove("drawing");
          appendChatMessage("error", data.error || `추천 요청에 실패했습니다. (${response.status})`);
          return;
        }

        sajuChatStarted = true;
        appendChatMessage("bot", "사주 분석 완료 · 추첨기가 계속 돌아가며 번호를 뽑습니다.");

        const sorted = await runLiveDraw({
          fast: false,
          preset: data.recommendation,
          statusPrefix: "사주 추천",
          continueMixing: true,
          sajuContext: {
            profile: data.profile,
            recommendation: data.recommendation,
          },
        });
        addToHistory(sorted);
      } catch (err) {
        loadingMsg.remove();
        stopChuteSpin();
        stopSajuAnalysisMix();
        drawStatus.textContent = "사주 추천 실패 · 다시 시도해 주세요";
        drawStatus.classList.remove("drawing");
        appendChatMessage(
          "error",
          err instanceof Error && err.message
            ? err.message
            : "네트워크 오류입니다. 인터넷 연결과 배포 URL 접속 여부를 확인해 주세요."
        );
      } finally {
        isDrawing = false;
        setControlsDisabled(false);
        chatInput.focus();
      }
    }

    chatSendBtn.addEventListener("click", sendSajuChat);
    chatInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendSajuChat();
    });
    chatResetBtn.addEventListener("click", resetSajuChat);
    resetSajuChat();
    winnerSearchBtn.addEventListener("click", filterWinners);
    winnerSearch.addEventListener("keydown", (e) => {
      if (e.key === "Enter") filterWinners();
    });
    winnerSearch.addEventListener("search", filterWinners);
    loadMoreBtn.addEventListener("click", () => {
      visibleCount += PAGE_SIZE;
      renderWinnersList();
    });

    renderWinnersList();
  </script>
</body>
</html>
